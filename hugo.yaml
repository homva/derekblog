baseURL: "https://homva.github.io/derekblog/"
languageCode: zh-cn
title: Derek Blogs
theme: PaperMod

pagination:
  pagerSize: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Derek Blogs
  description: "简洁·现代·技术"
  keywords: [Blog, Tech, Programming]
  author: Admin
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "favicon.svg"

  homeInfoParams:
    Title: "👋 Hi, Welcome"
    Content: >
      这里是 Derek Blogs —— 记录技术探索与工程实践。
      简洁、务实、有深度。

  socialIcons:
    - name: github
      url: "https://github.com/"
    - name: rss
      url: "/index.xml"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: ""
    Text: ""
    appendFilePath: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: 🔍 搜索
      url: /search/
      weight: 10
    - identifier: archives
      name: 📂 归档
      url: /archives/
      weight: 20
    - identifier: tags
      name: 🏷 标签
      url: /tags/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
